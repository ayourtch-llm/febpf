[package]
name = "febpf"
version = "0.1.0"
edition = "2021"
description = "Fast userland eBPF engine with built-in verifier, debugger and program analysis"
license = "MIT OR Apache-2.0"

[lib]
name = "febpf"
path = "src/lib.rs"

[[bin]]
name = "febpf"
path = "src/main.rs"

[profile.release]
lto = true
codegen-units = 1

[profile.bench]
lto = true
codegen-units = 1
